<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentors</title>
    <link rel="stylesheet" href="./menlist.css">
</head>
<body>

    <div class="box">

        <div class="box-left">

            <header>
                <img src="./img/Logo-fin2 copy.png" alt="">
                <img src="./img/Profile.png" alt="">
            </header>

            <div class="box-bottom">
                <div class="card-left">
                    <img src="./img/insert_chart copy.png" alt="">
                    <h1>Статистика</h1>
                </div>
                <div class="card-left">
                    <img src="./img/mdi_view-grid-outline.png" alt="">
                    <h1>Курсы</h1>
                </div>
                <div class="card-left">
                    <img src="./img/supervised_user_circle.png" alt="">
                    <h1>Пользователи</h1>
                    <img src="./img/keyboard_arrow_down.png" alt="">
                </div>
                <div class="card-left active">
                    <img src="./img/supervisor_account.png" alt="">
                    <h1>Менторы</h1>
                </div>
                <div class="card-left">
                    <img src="./img/settings.png" alt="">
                    <h1>Настройки</h1>
                    <img src="./img/keyboard_arrow_down (1).png" alt="">
                </div>
            </div>

        </div>

        <main class="box-right">
            <div class="top-bar">
                <h1>Менторы</h1>
                <button>+Новый Ментор</button>
            </div>
            <div id="mentorsGrid" class="grid">
                
            </div>
        </main>

    </div>


    <script src="./menlist.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omuz Courses</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">


        <aside class="sidebar">

            <div class="logo">
                <img src="./img/Logo-fin2 copy.png" alt="">
            </div>

            <ul class="menu">

                <li>
                    <a href="#">
                        <img src="./img/insert_chart copy.png" alt="">
                        Statistics
                    </a>
                </li>

                <li class="active">
                    <a href="#">
                        <img src="./img/mdi_view-grid-outline.png" alt="">
                        Courses
                    </a>
                </li>

                <li>
                    <a href="#">
                        <img src="./img/supervised_user_circle.png" alt="">
                        Users
                    </a>
                </li>

                <li>
                    <a href="#">
                        <img src="./img/supervisor_account.png" alt="">
                        Mentors
                    </a>
                </li>

                <li>
                    <a href="#">
                        <img src="./img/settings.png" alt="">
                        Settings
                    </a>
                </li>

            </ul>

        </aside>


        <main class="main">

            <header class="header">

                <h1>Курсы</h1>

                <a href="./sadoqat.html">+ Новый курс</a>

            </header>

            <section class="courses">

                <div id="coursesGrid" class="grid">


                </div>

            </section>

        </main>

    </div>
    <div class="overlay" id="overlay">

        <div class="drawer">

            <div class="drawer-header">

                <span id="close">&times;</span>

                <h3>Course</h3>

            </div>

            <div class="drawer-top">

                <div>

                    <h2 id="courseName"></h2>

                    <p>📚 Modules:
                        <span id="courseModule"></span>
                    </p>

                    <p>📖 Lessons:
                        <span id="courseLesson"></span>
                    </p>

                </div>

                <img id="courseLogo">

            </div>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
